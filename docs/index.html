<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Terminal Portfolio | Customizable Template</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0a'/%3E%3Ctext x='50' y='65' text-anchor='middle' fill='%2300ff00' font-size='50' font-family='monospace'%3E%3E_%3C/text%3E%3C/svg%3E">
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/terminal.css">
    <!-- Tailwind CDN is optional; we keep for compatibility but main styling is custom -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Suppress harmless CDN warning -->
    <script>console.warn = function () { };</script>
</head>

<body class="terminal-bg">
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle mobile menu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Quick Commands Panel (Mobile) -->
    <div class="quick-commands-panel" id="quickCommandsPanel">
        <div class="quick-commands-header">
            <span class="quick-commands-title">Quick Commands</span>
            <button class="quick-commands-close" id="quickCommandsClose" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="quick-commands-list" id="quickCommandsList">
            <!-- Buttons dynamically generated from command registry for consistency -->
        </div>
    </div>

    <div class="terminal-container">
        <!-- Terminal Header -->
        <div class="terminal-header">
            <div class="terminal-controls">
                <div class="terminal-dot" style="background: #ff5f56;"></div>
                <div class="terminal-dot" style="background: #ffbd2e;"></div>
                <div class="terminal-dot" style="background: #27c93f;"></div>
            </div>
            <div class="terminal-title">
                <span class="terminal-title-text" id="terminalTitleUser">jerdon@portfolio</span>
                <span class="terminal-title-separator">—</span>
                <span class="terminal-title-path">~/terminal</span>
            </div>
            <div class="terminal-actions">
                <button class="terminal-action-btn" id="minimizeBtn" aria-label="Minimize" title="Minimize">
                    <i class="fas fa-window-minimize"></i>
                </button>
                <button class="terminal-action-btn" id="maximizeBtn" aria-label="Maximize" title="Maximize">
                    <i class="fas fa-window-maximize"></i>
                </button>
                <button class="terminal-action-btn" id="closeBtn" aria-label="Close" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Terminal Output -->
        <div class="terminal-output" id="terminalOutput"></div>

        <!-- Mobile Swipe Hint -->
        <div class="swipe-hint" id="swipeHint">
            <i class="fas fa-chevron-left"></i>
            <span>Swipe left for commands</span>
            <i class="fas fa-chevron-right"></i>
        </div>

        <!-- Terminal Input -->
        <div class="terminal-input-line">
            <div class="prompt-container">
                <span class="prompt prompt-line1">┌─[<span class="prompt-user">jerdon</span>@<span
                        class="prompt-host">portfolio</span>]─[<span class="prompt-path">~</span>]</span>
                <span class="prompt prompt-line2">└──╼ $</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="terminalInput" class="terminal-input" autofocus autocomplete="off"
                    spellcheck="false" placeholder="Type a command...">
            </div>
            <button class="send-btn" id="sendBtn" aria-label="Send command">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Overlay for mobile menu -->
    <div class="overlay" id="overlay"></div>

    <!-- Hidden SEO content -->
    <div class="sr-only" aria-hidden="true">
        <h1>Developer Portfolio | Terminal Style</h1>
        <p>Full-Stack Developer & QA Specialist Portfolio</p>
    </div>

    <!-- External Scripts (Modular) -->
    <script src="./js/terminal-config.js"></script>
    <script src="./js/terminal-core.js"></script>
    <script src="./js/terminal-ui.js"></script>
    <script src="./js/terminal.js"></script>
</body>

</html>
